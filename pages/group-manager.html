<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Group Manager | SocialSpaces</title>
    <meta name="description" content="Review and approve join requests for groups you created on SocialSpaces.">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#38B6FF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <!-- Prevent dark-mode flash -->
    <script>try { var t = localStorage.getItem('eca-theme'); if (t === 'dark') { document.documentElement.classList.add('dark') } else { document.documentElement.classList.add('light') } } catch (e) { }</script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <!-- Top Nav -->
    <nav style="background: var(--surface-50); padding: var(--space-16); border-bottom: 1px solid var(--surface-200); position: sticky; top: 0; z-index: 100;">
        <div style="max-width: 1400px; margin: 0 auto; display: flex; gap: var(--space-16); align-items: center;">
            <a href="dashboard.html" style="font-family: 'Anurati', sans-serif; font-weight: 400; color: var(--base-white); text-decoration: none; white-space: nowrap;">SocialSpaces</a>

            <div style="display: flex; gap: var(--space-12); align-items: center; margin-left: 8px;">
                <a href="dashboard.html" style="font-size: 14px; color: var(--text-muted); text-decoration: none; padding: 6px 12px; border-radius: var(--radius-full); transition: all 0.2s;" onmouseover="this.style.background='var(--surface-200)'" onmouseout="this.style.background='transparent'">🔍 Discover</a>
                <a href="my-groups.html" style="font-size: 14px; color: var(--text-muted); text-decoration: none; padding: 6px 12px; border-radius: var(--radius-full); transition: all 0.2s;" onmouseover="this.style.background='var(--surface-200)'" onmouseout="this.style.background='transparent'">👥 My Groups</a>
                <a href="group-manager.html" style="font-size: 14px; color: var(--primary-500); text-decoration: none; padding: 6px 12px; border-radius: var(--radius-full); background: var(--primary-50); font-weight: 600;">👑 Manage</a>
            </div>

            <div class="user-menu" style="display: flex; align-items: center; gap: var(--space-16); margin-left: auto;">
                <!-- Notification dropdown injected by JS -->
                <button id="dark-mode-toggle">🌙 Dark Mode</button>
                <a href="profile.html" style="text-decoration: none;">
                    <div class="avatar avatar-s" id="nav-avatar">?</div>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Layout: Sidebar + Panel -->
    <main style="max-width: 1400px; margin: 0 auto; padding: var(--space-32) var(--space-24);">

        <div style="margin-bottom: var(--space-32);">
            <h2 style="margin-bottom: var(--space-8);">👑 Group Manager</h2>
            <p class="text-muted">Review and approve join requests for groups you created.</p>
        </div>

        <div style="display: grid; grid-template-columns: 300px 1fr; gap: var(--space-32);">

            <!-- Sidebar: Your Groups -->
            <aside style="position: sticky; top: 80px; height: fit-content; max-height: calc(100vh - 100px); overflow-y: auto;">
                <div style="margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
                    <h4 style="margin: 0; font-size: 15px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Your Groups</h4>
                    <a href="create-group.html" class="btn btn-primary btn-sm">+ New</a>
                </div>
                <div id="groups-list" style="display: flex; flex-direction: column; gap: 8px;">
                    <div style="text-align:center;padding:24px;color:var(--text-muted);">Loading...</div>
                </div>
            </aside>

            <!-- Request Panel -->
            <div>
                <div id="selected-group-header"></div>
                <div id="requests-panel">
                    <div style="text-align:center;padding:64px 24px;color:var(--text-muted);">
                        <div style="font-size:48px;margin-bottom:16px;">👈</div>
                        <p>Select a group to view join requests</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="../js/group-manager.js"></script>
</body>

</html>
