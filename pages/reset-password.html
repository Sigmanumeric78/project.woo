<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SocialSpaces</title>
    <meta name="description" content="Set a new password for your SocialSpaces account.">
    <!-- Prevent dark-mode flash -->
    <script>try { var t = localStorage.getItem('eca-theme'); if (t === 'dark') { document.documentElement.classList.add('dark') } else { document.documentElement.classList.add('light') } } catch (e) { }</script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>

<body style="height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--surface-50);">

    <button id="dark-mode-toggle" style="position:fixed;top:16px;right:16px;z-index:999;">🌙 Dark Mode</button>

    <div style="width: 100%; max-width: 400px; background: var(--surface-100); padding: var(--space-32); border-radius: var(--radius-lg); box-shadow: var(--shadow-md);">

        <div style="text-align: center; margin-bottom: var(--space-24);">
            <span style="font-family: 'Anurati', sans-serif; font-size: 40px; color: var(--primary-500);">SocialSpaces</span>
        </div>

        <!-- Verifying state -->
        <div id="verifying-view" style="text-align: center; padding: 24px 0;">
            <div style="font-size: 32px; margin-bottom: 12px;">⏳</div>
            <p class="text-muted">Verifying reset link...</p>
        </div>

        <!-- Invalid/expired link -->
        <div id="invalid-view" style="display: none; text-align: center; padding: 16px 0;">
            <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
            <h3 style="margin-bottom: 12px;">Link Invalid or Expired</h3>
            <p class="text-muted" style="font-size: 14px; margin-bottom: var(--space-24);">
                This reset link has expired or already been used. Request a new one.
            </p>
            <a href="forgot-password.html" class="btn btn-primary" style="width: 100%;">Request New Link</a>
        </div>

        <!-- Reset Form -->
        <div id="reset-view" style="display: none;">
            <h2 style="text-align: center; margin-bottom: var(--space-8);">Set New Password</h2>
            <p class="text-muted" style="text-align: center; font-size: 14px; margin-bottom: var(--space-24);">
                Choose a strong password for your account.
            </p>

            <div id="error-message" style="display: none; padding: 12px; background: var(--error-bg); border: 1px solid var(--error-text); border-radius: 8px; margin-bottom: 16px; color: var(--error-text); font-size: 14px;"></div>

            <form id="new-pass-form">
                <div class="form-group">
                    <label class="label">New Password</label>
                    <input id="new-password" type="password" class="input" placeholder="Min. 8 characters" required minlength="8">
                </div>
                <div class="form-group">
                    <label class="label">Confirm Password</label>
                    <input id="confirm-password" type="password" class="input" placeholder="Repeat password" required>
                </div>
                <button id="save-btn" type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-8);">
                    Save New Password
                </button>
            </form>
        </div>

        <!-- Success -->
        <div id="success-view" style="display: none; text-align: center; padding: 16px 0;">
            <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
            <h3 style="margin-bottom: 12px;">Password Updated!</h3>
            <p class="text-muted" style="font-size: 14px; margin-bottom: var(--space-24);">
                Your password has been changed successfully.
            </p>
            <a href="login.html" class="btn btn-primary" style="width: 100%;">Log In Now</a>
        </div>
    </div>

    <script type="module">
        import { auth } from '../js/firebase-config.js';
        import { verifyPasswordResetCode, confirmPasswordReset } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { initDarkModeToggle } from '../js/dark-mode.js';

        initDarkModeToggle();

        const params = new URLSearchParams(window.location.search);
        const oobCode = params.get('oobCode');

        const verifyingView = document.getElementById('verifying-view');
        const invalidView   = document.getElementById('invalid-view');
        const resetView     = document.getElementById('reset-view');
        const successView   = document.getElementById('success-view');
        const errorMsg      = document.getElementById('error-message');
        const form          = document.getElementById('new-pass-form');
        const saveBtn       = document.getElementById('save-btn');

        function show(id) {
            [verifyingView, invalidView, resetView, successView].forEach(el => el.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        // Verify the code on load
        async function init() {
            if (!oobCode) { show('invalid-view'); return; }
            try {
                await verifyPasswordResetCode(auth, oobCode);
                show('reset-view');
            } catch (err) {
                show('invalid-view');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const newPass = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (newPass !== confirm) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }
            if (newPass.length < 8) {
                errorMsg.textContent = 'Password must be at least 8 characters.';
                errorMsg.style.display = 'block';
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';

            try {
                await confirmPasswordReset(auth, oobCode, newPass);
                show('success-view');
            } catch (err) {
                const messages = {
                    'auth/expired-action-code': 'Reset link has expired. Please request a new one.',
                    'auth/invalid-action-code': 'Invalid reset code. Please request a new link.',
                    'auth/weak-password': 'Password is too weak. Use at least 8 characters.'
                };
                errorMsg.textContent = messages[err.code] || err.message;
                errorMsg.style.display = 'block';
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save New Password';
            }
        });

        init();
    </script>
</body>

</html>
