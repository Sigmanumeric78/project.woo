<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Log In | SocialSpaces</title>
    <meta name="description" content="Log in to SocialSpaces and connect with groups near you.">
    <!-- PWA / Android -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#38B6FF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <!-- Prevent dark-mode flash -->
    <script>try { var t = localStorage.getItem('eca-theme'); if (t === 'dark') { document.documentElement.classList.add('dark') } else { document.documentElement.classList.add('light') } } catch (e) { }</script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <script src="https://www.google.com/recaptcha/enterprise.js?render=6LfBmngsAAAAANLwajriiJ6BcdzyV2GxeugmSnwr" async defer></script>

    <style>
        /* ── Page Reset: allow scrolling, prevent horizontal overflow ─── */
        * {
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden !important;
            -webkit-text-size-adjust: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
        }

        /* ── Theme toggle: top-right ──────────────────────────── */
        #dark-mode-toggle {
            position: fixed;
            top: calc(12px + env(safe-area-inset-top));
            right: 16px;
            z-index: 999;
            padding: 8px 12px;
            font-size: 13px;
            border: 1px solid var(--surface-300);
            background: var(--surface-100);
            border-radius: var(--radius-md);
            color: var(--text-muted);
            cursor: pointer;
        }

        /* ── Page wrapper: centers on desktop, stacks on mobile ─ */
        .login-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 16px 32px;   /* top pad clears fixed toggle */
            width: 100%;
            max-width: 100vw;
        }

        @media (max-width: 480px) {
            .login-page {
                justify-content: flex-start;  /* stick to top on small phones */
                padding-top: 60px;
            }
        }

        /* ── Login Card ───────────────────────────────────────── */
        .login-card {
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            border: 1px solid var(--surface-200);
        }

        /* ── Card Header (Minimalist) ───────────────────── */
        .login-header {
            padding: 32px 24px 8px;
            text-align: center;
            background: transparent;
        }

        .login-logo {
            font-family: 'Anurati', sans-serif;
            font-size: clamp(24px, 8vw, 36px);
            color: var(--base-white);
            letter-spacing: 2px;
            display: block;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 4px 12px rgba(255,255,255,0.1);
        }

        .login-header p {
            color: var(--text-description);
            font-size: 13px;
            margin: 0;
            font-family: var(--font-body);
        }

        /* ── Card Body ────────────────────────────────────────── */
        .login-body {
            padding: 24px 28px 32px;
        }

        @media (max-width: 380px) {
            .login-body {
                padding: 20px;
            }
        }

        /* ── Error Banner ─────────────────────────────────────── */
        #error-message {
            display: none;
            padding: 12px 14px;
            background: var(--error-bg, #300);
            border: 1px solid var(--error-text, #f44);
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            color: var(--error-text, #f87171);
            font-size: 13px;
            line-height: 1.5;
            border-left: 4px solid #ef4444;
        }

        /* ── Form inputs: prevent zoom on Android ─────────────── */
        .input {
            width: 100%;
            font-size: 16px !important; /* Stops Android keyboard zoom */
            min-height: 48px;
            border-radius: var(--radius-md);
        }

        /* ── Password toggle ──────────────────────────────────── */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper .input {
            padding-right: 48px;
        }

        #toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            min-height: unset;
            padding: 4px;
            line-height: 1;
        }

        /* ── Submit button ────────────────────────────────────── */
        #login-btn {
            width: 100%;
            min-height: 52px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 8px;
        }

        /* ── Divider ──────────────────────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            width: 100%;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--surface-300);
        }

        .divider span {
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-body);
            white-space: nowrap;
        }

        /* ── Google button ────────────────────────────────────── */
        #google-btn {
            width: 100%;
            min-height: 52px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #google-btn img {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* ── Footer links ─────────────────────────────────────── */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
            font-family: var(--font-body);
        }

        .login-footer a {
            color: var(--primary-500);
            text-decoration: none;
            font-weight: 600;
        }

        /* ── Safe area bottom padding ─────────────────────────── */
        .login-page {
            padding-bottom: max(32px, env(safe-area-inset-bottom));
        }

        /* Hide recaptcha badge completely since it interferes on mobile */
        .grecaptcha-badge {
            visibility: hidden !important;
            opacity: 0 !important;
        }
    </style>
</head>

<body>
    <!-- Dark Mode Toggle -->
    <button id="dark-mode-toggle">🌙</button>

    <div class="login-page">
        <div class="login-card">

            <!-- Gradient Header -->
            <div class="login-header">
                <span class="login-logo">SocialSpaces</span>
                <p>Connect with real people, nearby</p>
            </div>

            <!-- Form Body -->
            <div class="login-body">

                <h2 style="margin: 0 0 20px; font-size: 22px; text-align: center;">Welcome Back</h2>

                <!-- Error Message -->
                <div id="error-message"></div>

                <form id="login-form" novalidate>
                    <!-- Email -->
                    <div class="form-group">
                        <label class="label" for="email">Email</label>
                        <input
                            id="email"
                            type="email"
                            class="input"
                            placeholder="you@example.com"
                            autocomplete="email"
                            inputmode="email"
                            required>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label class="label" style="display: flex; justify-content: space-between; align-items: center;">
                            <span>Password</span>
                            <a href="forgot-password.html" style="font-size: 12px; color: var(--primary-500); font-weight: 500;">Forgot password?</a>
                        </label>
                        <div class="password-wrapper">
                            <input
                                id="password"
                                type="password"
                                class="input"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                required>
                            <button type="button" id="toggle-password" aria-label="Show password">👁️</button>
                        </div>
                    </div>

                    <!-- Login Button -->
                    <button id="login-btn" type="submit" class="btn btn-primary">
                        Log In
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider"><span>or continue with</span></div>

                <!-- Google -->
                <button id="google-btn" type="button" class="btn btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    Continue with Google
                </button>

                <!-- Sign Up Link -->
                <p class="login-footer" style="margin-top: 24px;">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Auth Script -->
    <script type="module">
        import { authService } from '../js/auth-service.js';
        import { redirectIfAuthenticated } from '../js/route-guard.js';
        import { initDarkModeToggle } from '../js/dark-mode.js';

        initDarkModeToggle();
        redirectIfAuthenticated();

        const form        = document.getElementById('login-form');
        const emailInput  = document.getElementById('email');
        const passInput   = document.getElementById('password');
        const loginBtn    = document.getElementById('login-btn');
        const googleBtn   = document.getElementById('google-btn');
        const errorDiv    = document.getElementById('error-message');
        const togglePass  = document.getElementById('toggle-password');

        // Show/hide password
        togglePass.addEventListener('click', () => {
            const isText = passInput.type === 'text';
            passInput.type = isText ? 'password' : 'text';
            togglePass.textContent = isText ? '👁️' : '🙈';
        });

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            // Scroll so error is visible on small phones
            errorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            setTimeout(() => { errorDiv.style.display = 'none'; }, 6000);
        }

        function setLoading(btn, loading) {
            btn.disabled = loading;
            if (loading) {
                btn.dataset.orig = btn.innerHTML;
                btn.innerHTML = '<span style="opacity:0.7">Loading…</span>';
            } else {
                btn.innerHTML = btn.dataset.orig || btn.innerHTML;
            }
        }

        // Email/Password login
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            const email    = emailInput.value.trim();
            const password = passInput.value;
            if (!email || !password) return;

            setLoading(loginBtn, true);

            grecaptcha.enterprise.ready(async () => {
                await grecaptcha.enterprise.execute('6LfBmngsAAAAANLwajriiJ6BcdzyV2GxeugmSnwr', { action: 'LOGIN' });
                const result = await authService.loginWithEmail(email, password);

                if (result.success) {
                    const profile = await authService.loadUserProfile(result.user.uid);
                    window.location.href = (profile && profile.profileComplete)
                        ? 'dashboard.html'
                        : 'profile-setup.html';
                } else {
                    setLoading(loginBtn, false);
                    showError(result.error);
                }
            });
        });

        // Google login
        googleBtn.addEventListener('click', async () => {
            errorDiv.style.display = 'none';
            setLoading(googleBtn, true);

            grecaptcha.enterprise.ready(async () => {
                await grecaptcha.enterprise.execute('6LfBmngsAAAAANLwajriiJ6BcdzyV2GxeugmSnwr', { action: 'LOGIN' });
                const result = await authService.loginWithGoogle();

                if (result.success) {
                    const profile = await authService.loadUserProfile(result.user.uid);
                    window.location.href = (profile && profile.profileComplete)
                        ? 'dashboard.html'
                        : 'profile-setup.html';
                } else {
                    setLoading(googleBtn, false);
                    if (result.error !== 'Login cancelled') showError(result.error);
                }
            });
        });
    </script>
</body>

</html>
