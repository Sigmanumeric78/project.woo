<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... | SocialSpaces</title>
    <!-- Prevent dark-mode flash -->
    <script>try { var t = localStorage.getItem('eca-theme'); if (t === 'dark') { document.documentElement.classList.add('dark') } else { document.documentElement.classList.add('light') } } catch (e) { }</script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>

<body style="height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--surface-50);">

    <div style="text-align: center; padding: 48px 24px;">
        <div style="font-family: 'Anurati', sans-serif; font-size: 36px; color: var(--primary-500); margin-bottom: 24px;">SocialSpaces</div>

        <div id="status-icon" style="font-size: 48px; margin-bottom: 16px;">⏳</div>
        <h2 id="status-title" style="margin-bottom: 12px;">Processing...</h2>
        <p id="status-msg" class="text-muted" style="font-size: 15px; margin-bottom: 24px; max-width: 360px; margin-left: auto; margin-right: auto;"></p>
        <div id="status-action"></div>
    </div>

    <script type="module">
        import { auth } from '../js/firebase-config.js';
        import {
            applyActionCode,
            verifyPasswordResetCode
        } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const params   = new URLSearchParams(window.location.search);
        const mode     = params.get('mode');
        const oobCode  = params.get('oobCode');

        const icon     = document.getElementById('status-icon');
        const title    = document.getElementById('status-title');
        const msg      = document.getElementById('status-msg');
        const action   = document.getElementById('status-action');

        function setStatus(iconStr, titleStr, msgStr, actionHtml = '') {
            icon.textContent = iconStr;
            title.textContent = titleStr;
            msg.textContent = msgStr;
            action.innerHTML = actionHtml;
        }

        async function handleAction() {
            if (!mode || !oobCode) {
                setStatus('❌', 'Invalid Link', 'This link is missing required parameters.',
                    `<a href="login.html" class="btn btn-primary">Go to Login</a>`);
                return;
            }

            if (mode === 'resetPassword') {
                // Redirect to the dedicated reset-password page
                window.location.href = `reset-password.html?${params.toString()}`;
                return;
            }

            if (mode === 'verifyEmail') {
                try {
                    await applyActionCode(auth, oobCode);
                    setStatus('🎉', 'Email Verified!',
                        'Your email has been verified successfully. You can now log in.',
                        `<a href="login.html" class="btn btn-primary">Log In Now</a>`);
                } catch (err) {
                    setStatus('❌', 'Verification Failed',
                        'This link has already been used or has expired. Please request a new verification email.',
                        `<a href="login.html" class="btn btn-secondary">Go to Login</a>`);
                }
                return;
            }

            // Unknown mode
            setStatus('❓', 'Unknown Action', 'This link type is not recognized.',
                `<a href="login.html" class="btn btn-secondary">Go to Login</a>`);
        }

        handleAction();
    </script>
</body>

</html>
