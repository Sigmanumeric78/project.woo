<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SocialSpaces</title>
    <meta name="description" content="Reset your SocialSpaces password. Enter your email and we'll send a reset link.">
    <!-- Prevent dark-mode flash -->
    <script>try { var t = localStorage.getItem('eca-theme'); if (t === 'dark') { document.documentElement.classList.add('dark') } else { document.documentElement.classList.add('light') } } catch (e) { }</script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>

<body style="height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--surface-50);">

    <!-- Dark mode toggle (fixed) -->
    <button id="dark-mode-toggle" style="position:fixed;top:16px;right:16px;z-index:999;">🌙 Dark Mode</button>

    <div style="width: 100%; max-width: 400px; background: var(--surface-100); padding: var(--space-32); border-radius: var(--radius-lg); box-shadow: var(--shadow-md);">

        <div style="text-align: center; margin-bottom: var(--space-24);">
            <span style="font-family: 'Anurati', sans-serif; font-size: 40px; color: var(--primary-500);">SocialSpaces</span>
        </div>

        <!-- Initial form -->
        <div id="form-view">
            <h2 style="text-align: center; margin-bottom: var(--space-8);">Forgot Password?</h2>
            <p class="text-muted" style="text-align: center; font-size: 14px; margin-bottom: var(--space-24);">
                Enter your email and we'll send you a reset link.
            </p>

            <!-- Error/feedback message -->
            <div id="error-message" style="display: none; padding: 12px; background: var(--error-bg); border: 1px solid var(--error-text); border-radius: 8px; margin-bottom: 16px; color: var(--error-text); font-size: 14px;"></div>

            <form id="reset-form">
                <div class="form-group">
                    <label class="label">Email Address</label>
                    <input id="email" type="email" class="input" placeholder="you@example.com" required>
                </div>

                <button id="reset-btn" type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-8);">
                    Send Reset Link
                </button>
            </form>

            <p class="text-muted" style="text-align: center; margin-top: var(--space-24); font-size: var(--text-sm);">
                Remembered? <a href="login.html" style="color: var(--primary-600);">Back to Login</a>
            </p>
        </div>

        <!-- Success view -->
        <div id="success-view" style="display: none; text-align: center; padding: 16px 0;">
            <div style="font-size: 48px; margin-bottom: 16px;">📬</div>
            <h3 style="margin-bottom: 12px;">Check your inbox</h3>
            <p class="text-muted" style="font-size: 14px; margin-bottom: var(--space-24); line-height: 1.6;">
                We've sent a password reset link to <strong id="sent-to-email"></strong>.<br>
                Check your spam folder if you don't see it.
            </p>
            <a href="login.html" class="btn btn-secondary" style="width: 100%;">Back to Login</a>
        </div>
    </div>

    <!-- Firebase Auth Script -->
    <script type="module">
        import { auth } from '../js/firebase-config.js';
        import { sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { initDarkModeToggle } from '../js/dark-mode.js';

        initDarkModeToggle();

        const form = document.getElementById('reset-form');
        const emailInput = document.getElementById('email');
        const resetBtn = document.getElementById('reset-btn');
        const errorMsg = document.getElementById('error-message');
        const formView = document.getElementById('form-view');
        const successView = document.getElementById('success-view');
        const sentToEl = document.getElementById('sent-to-email');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function setLoading(isLoading) {
            resetBtn.disabled = isLoading;
            resetBtn.textContent = isLoading ? 'Sending...' : 'Send Reset Link';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            const email = emailInput.value.trim();
            if (!email) return;

            setLoading(true);
            try {
                await sendPasswordResetEmail(auth, email, {
                    url: `${window.location.origin}/pages/login.html`
                });
                sentToEl.textContent = email;
                formView.style.display = 'none';
                successView.style.display = 'block';
            } catch (err) {
                const messages = {
                    'auth/user-not-found': 'No account found with that email.',
                    'auth/invalid-email': 'Please enter a valid email address.',
                    'auth/too-many-requests': 'Too many attempts. Please wait a moment and try again.'
                };
                showError(messages[err.code] || err.message);
                setLoading(false);
            }
        });
    </script>
</body>

</html>
